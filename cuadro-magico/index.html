<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Cuadro AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
      .arjs-loader {
        height: 100%; width: 100%; position: absolute; top: 0; left: 0;
        background-color: rgba(0, 0, 0, 0.8); z-index: 9999;
        display: flex; justify-content: center; align-items: center;
      }
      .arjs-loader div { text-align: center; font-size: 1.25em; color: white; font-family: sans-serif; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div class="arjs-loader"><div>Cargando la magia...</div></div>

    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

      <a-assets>
        <video id="vid" src="20260316-0625-56.2460858.mp4" 
               preload="auto" response-type="arraybuffer" loop 
               crossorigin="anonymous" webkit-playsinline playsinline>
        </video>
      </a-assets>

      <a-nft
        type="nft"
        url="./markers/parejaAR"
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5">
        
        <a-video
          src="#vid"
          width="150"
          height="150"
          position="75 0 -75"
          rotation="-90 0 0">
        </a-video>
      </a-nft>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Lógica para reproducir el video al detectar la imagen
      window.addEventListener('click', () => {
          const v = document.querySelector('#vid');
          v.play();
          v.pause();
      });

      const nft = document.querySelector('a-nft');
      nft.addEventListener('nft-found', () => {
          document.querySelector('#vid').play();
      });
      nft.addEventListener('nft-lost', () => {
          document.querySelector('#vid').pause();
      });
    </script>
  </body>
</html>
